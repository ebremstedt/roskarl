site_name: roskarl
site_description: Tiny environment variable helpers for Python
site_url: https://roskarl.bremstedtanalytics.se/
repo_url: https://github.com/ebremstedt/roskarl
repo_name: ebremstedt/roskarl
edit_uri: edit/main/docs/content/

docs_dir: content
site_dir: site

theme:
  name: material
  icon:
    logo: material/bird
  features:
    - navigation.top
    - content.code.copy
    - content.action.edit
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
